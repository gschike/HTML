<!DOCTYPE html>
<html lang="kr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시작하는 개발자들을 위한 개발자 도구 개론</title>

    <link rel="stylesheet" href="./last.css">
    <script src="./last.js"></script>

</head>

<body>
    <div class="top">
        <div>
            <img id="btn-main" src="./image/LOGO.png">
        </div>
    </div>

    <div class="main">
        <div class="container">
            <button type="button" class="btn-white btn-main" id="before-btn" title="대화 돌아가기">&lt; 뒤로가기</button>

            <div class="character-container">
                <div class="bubble" id="talkBubble">
                    <span id="talk">안녕!!!</span>
                </div>

                <div class="character">
                    <div class="hair-back"></div>
                    <div class="face">
                        <div class="hair-fringe"></div>
                        <div class="eyes">
                            <div class="eye left"></div>
                            <div class="eye right"></div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                    <div class="body">
                        <div class="hoodie"></div>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-white btn-main" id="next-btn" title="대화 넘어가기">다음 &gt;</button>
        </div>

        <div class="input-container">
            <input type="text" id="answer-input" placeholder="정답을 입력해줘!">
            <button type="button" class="btn-purple" id="answer-btn">정답</button>
            <button type="button" class="btn-white" id="hint-btn">힌트보기</button>
            <button type="button" class="btn-white" id="replay-btn">다시실행</button>
            <button type="button" class="btn-white" id="nextPage-btn">넘어가기</button>
            <button type="button" class="btn-white" id="fin-btn">게임 종료</button>
        </div>
    </div>

    <div class="game">
        <span class="stage1" id="frag1">첫번째 : </span>
        <div class="stage1" id="frag2">두번째<br> : </div>
        <span class="stage1" id="frag3">세번째 : </span>
    </div>

    <div class="overlay hint">
        <div class="pop">
            <div class="popBtn" id="hintContent"></div>
            <button type="button" class="btn-purple" id="hintClose">닫기</button>
        </div>
    </div>

    <div class="overlay end">
        <div class="pop">
            <div id="endMessage">
                축하합니다!
                <br>게임을 완료했습니다!
                <br>다음에 또 만나요! 안녕!!
            </div>
            <a href="./main.html">
                <button type="button" class="popBtn" id="backMain">끝내기</button>
            </a>
        </div>
    </div>

</body>

</html>
