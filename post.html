<!DOCTYPE html>
<html lang="kr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGO 게시글</title>
    <link rel="stylesheet" href="./post.css">

    <script src="./phi/jquery-3.7.1.js"></script>
    <script src="./phi/sj.api.v1.sj.js" defer></script>
    <script src="./post.js"></script>
</head>

<body>
    <!-- 모달창 -->
    <div id="Delete-Popup">
        <div class="modal-content">
            <div class="modal-text"><span>정말 삭제하시겠습니까?</span></div>
            <div class="modal-btns">
                <button type="button" class="btn-confirm">삭제</button>
                <button type="button" class="btn-cancel">취소</button>
            </div>
        </div>
    </div>

    <!-- 헤더 -->
    <div class="top">
        <div class="GNB">
            <div class="left">
                <a href="./home.html">
                    <img id="logo" src="./image/LOGO.png">
                </a>
            </div>

            <div class="beforeLogin">
                <button type="button" class="topBtn" id="btn-login">로그인</button>
                <button type="button" class="topBtn" id="btn-join">회원가입</button>
            </div>
            <div class="afterLogin">
                <button type="button" class="topBtn" id="btn-logout">로그아웃</button>
                <button type="button" class="topBtn" id="btn-myPage">마이 페이지</button>
            </div>
        </div>
        <div class="LNB">
            <a id="LNBadminPage" href="./main_Mng.html">
                <div class="LNBbtn">관리자 페이지</div>
            </a>
            <div class="LNBbtn" id="LNBmyPage">마이 페이지</div>
            <div class="LNBbtn" id="LNBnotice">공지사항</div>
            <div class="LNBbtn" id="LNBcomm">커뮤니티</div>

            <div class="LNBbtn gameMenu">
                게임
                <div class="gameList">
                    <a href="./main.html">
                        <div class="gameItem">시작하는 개발자들을 위한 개발자 도구 개론</div>
                    </a>
                    <a href="./game1-html.html">
                        <div class="gameItem">HTML 타자 연습</div>
                    </a>
                    <a href="./game2-css.html">
                        <div class="gameItem">CSS lab</div>
                    </a>
                    <a href="./Stage1_jsl.html">
                        <div class="gameItem">나를 찾아 주세요</div>
                    </a>
                </div>
            </div>
        </div>
    </div>


    <!-- 메인 -->
    <div class="main">
        <div class="left">
            <button type="button" class="topBtn" id="btn-comm">목록</button>
        </div>

        <div class="title">
            <div>
                <h2 id="title">제목을 씁시다</h2>
            </div>

            <div class="postInfo">
                <div class="postInfo-left">
                    <div id="postInfo-left-userName">작성자</div>
                    <div id="postInfo-left-postingTime">작성 시간</div>
                </div>

                <!-- <div class="postInfo-right">
                    <div id="postInfo-right-views">조회 <sapn id="postInfo-right-views-cnt">0</sapn>
                    </div>
                    <div id="postInfo-right-likes">추천 <span>0</span></div>
                    <div id="postInfo-right-comment">
                        <a href="#comment-line">
                            <button type="button" id="btn-comment">댓글 <span>0</span></button>
                        </a>
                    </div>
                    <div id="postInfo-right-copy">
                        <button type="button" id="btn-URL">URL 복사</button>
                    </div>
                </div> -->
            </div>
        </div>

        <hr class="line title-post-line">

        <div class="content">
            <div class="postInfo-right">
                <div id="postInfo-right-views">조회 <sapn id="postInfo-right-views-cnt">0</sapn>
                </div>
                <div id="postInfo-right-likes">추천 <span>0</span></div>
                <div id="postInfo-right-comment">
                    <a href="#comment-line">
                        <button type="button" id="btn-comment">댓글 <span>0</span></button>
                    </a>
                </div>
                <div id="postInfo-right-copy">
                    <button type="button" id="btn-URL">URL 복사</button>
                </div>
            </div>

            <div class="post-content">
                내용내용내용내용내용
            </div>
        </div>

    </div>
    <div>
        <div class="wrap">
            <div id="recommend-wrap">
                <div id="like" class="recommend">추천 ! <span class="recommend-cnt">0</span></div>
                <div id="unlike" class="recommend">비추천 ! <span class="recommend-cnt">0</span></div>
            </div>
        </div>
        <div id="edit-btn-wrap">
            <div id="edit-btns">
                <div id="post-btn-edit" class="post-btn">수정</div>
                <div id="post-btn-dlt" class="post-btn">삭제</div>
                <div class="go-title"> <a href="#title">제목으로</a></div>
            </div>
        </div>
    </div>

    <hr id="comment-line" class="line post-comment-line">
    <div class="remote"></div>
    </div>



    <!-- 댓글 컨테이너 -->
    <div id="wrap_Cmt">
        <!-- head -->
        <div id="cmt_Head">
            <div id="fl_Left" class="left">
                <div>댓글 <span id="cmt_commentCount">0</span></div>
                <!-- <label><input type="radio" name="array" value="1">안녕1</label>
                <label><input type="radio" name="array" value="2">안녕2</label>
                <label><input type="radio" name="array" value="3">안녕3</label> -->
            </div>

            <!-- <div id="fl_Right" class="right">
                <a href="">댓글 등록 (버튼)</a>
                <a href="">본문 보기 (버튼)</a>
            </div> -->
        </div>

        <!-- 댓글 입력창 -->
        <div class="inputCmt"></div>
        <!-- <a href="">전체글 (메인 페이지로 가는 버튼)</a> -->
        <div id="cmt_Plus_wrap">
            <!-- 댓글나오는 곳 -->
            <div class="cmt_Space"></div>
        </div>
    </div>

</body>

</html>
