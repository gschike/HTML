<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 작성 페이지</title>
    <link rel="stylesheet" href="post_Writer.css">

    <script src="./phi/jquery-3.7.1.js"></script>
    <script src="./phi/sj.api.v1.sj.js" defer></script>
    <script src="post_Writer.js"></script>

    <!-- rich text 라이브러리 -->


    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <!-- ----------------------------------------------------------------------- -->

</head>

<body>
    <!-- 헤더 -->
    <div class="top">
        <div class="GNB">
            <div class="left">
                <a href="./home.html">
                    <img id="logo" src="./image/LOGO.png">
                </a>
            </div>

            <div class="beforeLogin">
                <button type="button" class="topBtn" id="btn-login">로그인</button>
                <button type="button" class="topBtn" id="btn-join">회원가입</button>
            </div>
            <div class="afterLogin">
                <button type="button" class="topBtn" id="btn-logout">로그아웃</button>
                <button type="button" class="topBtn" id="btn-myPage">마이 페이지</button>
            </div>
        </div>
        <div class="LNB">
            <div class="LNBbtn" id="LNBadminPage">관리자 페이지</div>
            <div class="LNBbtn" id="LNBmyPage">마이 페이지</div>
            <div class="LNBbtn" id="LNBnotice">공지사항</div>
            <div class="LNBbtn" id="LNBcomm">커뮤니티</div>

            <div class="LNBbtn gameMenu">
                게임
                <div class="gameList">
                    <a href="./main.html">
                        <div class="gameItem">시작하는 개발자들을 위한 개발자 도구 개론</div>
                    </a>
                    <a href="./game1-html.html">
                        <div class="gameItem">HTML 타자 연습</div>
                    </a>
                    <a href="./game2-css.html">
                        <div class="gameItem">CSS lab</div>
                    </a>
                    <a href="./Stage1_jsl.html">
                        <div class="gameItem">나를 찾아 주세요</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 메인 -->
    <div class="main">
        <div id="upload-Popup">
            <div class="modal-content">
                <div class="modal-text"><span>게시물을 등록하시겠습니까?</span></div>
                <div class="modal-btns">
                    <button type="button" class="btn-confirm">등록</button>
                    <button type="button" class="btn-cancel">취소</button>
                </div>
            </div>
        </div>

        <div id="wrap-all">
            <div id="write-section">
                <table>
                    <!-- 제목 / 옵션 -->
                    <thead>
                        <tr>
                            <th>
                                <select name="post_Type" id="">
                                    <option name="post_Type" value="1"> 전체글 </option>
                                    <option name="post_Type" value="2"> 공지사항 </option>
                                    <option name="post_Type" value="3"> 홈페이지 추가 </option>
                                </select>
                            </th>
                            <th> 제목: <input type="text" id="title"> </th>
                        </tr>

                        <tr>
                            <td colspan="2">
                                <div class="option-container">
                                    <div class="radio-group">
                                        <label><input type="radio" name="text_Type" value="1" checked> Text</label>
                                        <label><input type="radio" name="text_Type" value="2"> html</label>
                                    </div>
                                    <div class="nickname-area">
                                        작성자 : <span id="nickname">관리자</span>
                                    </div>
                                </div>
                            </td>
                        </tr>

                    </thead>

                    <!-- 본문 / 이미지 업로더 -->
                    <tbody>
                        <tr>
                            <td id="txtarea">
                                <div id="editor" style="height: 300px;"></div>
                                <!-- <textarea name="post_Val" id="txtArea"></textarea> -->
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <div class="upload-container">
                                    <form id="auto-upload-form" action="/upload" method="post"
                                        enctype="multipart/form-data">
                                        <input type="file" id="image-input" name="image" accept="image/*"
                                            style="display: none;">

                                        <label for="image-input" class="single-upload-btn">
                                            사진 업로드
                                        </label>
                                    </form>
                                </div>

                            </td>
                        </tr>
                        <tr>
                            <td>
                                <button id="write-complete">작성완료</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
